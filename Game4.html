<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internet Controversy — Stage 4</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    .scene {
      position: fixed;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .scene.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Persistent back button ── */
    #back-btn {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 100;
      font-family: 'Courier New', monospace;
      font-size: 13px; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase;
      text-decoration: none; color: #fff;
      background: rgba(10,10,14,0.85);
      border: 3px solid #fff; outline: 3px solid #000;
      padding: 8px 20px;
      transition: background 0.15s;
    }
    #back-btn:hover { background: #c0392b; }

    /* ══════════════════════════════
       SCENE — GRID PUZZLE
    ══════════════════════════════ */
    #scene-puzzle .room-bg {
      position: absolute; inset: 0;
      background-image: url('game4_dlg_bg.png');
      background-size: cover;
      background-position: center center;
      filter: blur(4px) brightness(0.35) saturate(0.7);
      transform: scale(1.06);
    }

    #grid-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      image-rendering: pixelated;
    }

    #puzzle-hud {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(10,10,14,0.92);
      border-top: 4px solid #fff;
      padding: 14px 32px;
      display: flex; align-items: center;
      justify-content: space-between;
      z-index: 30;
    }
    #puzzle-hud::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; right: 0;
      height: 4px; background: #c0392b;
      pointer-events: none;
    }
    #puzzle-hint {
      font-size: 15px; font-weight: 700;
      color: #f0f0f0; letter-spacing: 1px;
      text-transform: uppercase;
    }
    #puzzle-hint .key-tag {
      display: inline-block;
      background: #fff; color: #0d0d0d;
      padding: 2px 8px; margin: 0 3px;
      font-weight: 900; font-size: 14px;
    }
    #puzzle-hint .wall-tag {
      background: rgba(52,152,219,0.3);
      border: 2px solid #3498db;
      color: #7fccf0;
      padding: 2px 8px; margin: 0 3px;
    }
    #puzzle-hint .toxic-tag {
      background: rgba(192,57,180,0.3);
      border: 2px solid #c039b4;
      color: #f07ff0;
      padding: 2px 8px; margin: 0 3px;
    }
    #puzzle-hint .cancel-tag {
      background: rgba(200,20,20,0.3);
      border: 2px solid #c0392b;
      color: #ff8888;
      padding: 2px 8px; margin: 0 3px;
    }
    #step-counter {
      font-size: 16px; font-weight: 900;
      color: #c0392b; letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Flash overlays */
    #penalty-flash {
      position: fixed; inset: 0;
      background: rgba(180,30,160,0.35);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.08s;
      z-index: 200;
    }
    #penalty-flash.show { opacity: 1; }
    #penalty-flash.death { background: rgba(200,20,20,0.6); }

    #penalty-popup {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px; font-weight: 900;
      color: #f07ff0;
      text-shadow: 0 0 20px rgba(192,57,180,0.9);
      letter-spacing: 4px;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 210;
    }
    #penalty-popup.show { opacity: 1; }
    #penalty-popup.death-msg {
      color: #ff5555;
      font-size: 52px;
      text-shadow: 0 0 30px rgba(200,20,20,1);
    }

    /* ══════════════════════════════
       SCENE — STAGE COMPLETE
    ══════════════════════════════ */
    #scene-complete {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 32px; background: #0d0d0d;
    }
    #scene-complete .complete-title {
      font-size: 52px; font-weight: 900;
      color: #fff; letter-spacing: 4px;
      text-transform: uppercase;
    }
    #scene-complete .complete-title span { color: #c0392b; }
    #scene-complete .unlock-box {
      border: 4px solid #fff; outline: 4px solid #000;
      background: rgba(10,10,14,0.95);
      padding: 28px 48px; text-align: center;
      position: relative;
    }
    #scene-complete .unlock-box::before {
      content: ''; position: absolute;
      top: -1px; left: 0; right: 0;
      height: 4px; background: #c0392b;
    }
    #scene-complete .unlock-label {
      font-size: 13px; letter-spacing: 3px;
      color: #c0392b; text-transform: uppercase;
      margin-bottom: 10px;
    }
    #scene-complete .unlock-msg {
      font-size: 22px; font-weight: 900;
      color: #f0f0f0; letter-spacing: 1px;
    }
    #scene-complete .btn-back {
      font-family: 'Courier New', monospace;
      font-size: 16px; font-weight: 900;
      letter-spacing: 3px; text-transform: uppercase;
      text-decoration: none; color: #fff;
      background: #c0392b;
      border: 4px solid #fff; outline: 4px solid #000;
      padding: 14px 40px; cursor: pointer;
      transition: background 0.15s;
    }
    #scene-complete .btn-back:hover { background: #e74c3c; }
    #scene-complete .btn-ending {
      background: #0d0d0d;
      border-color: #fff;
    }
    #scene-complete .btn-ending:hover { background: #1a1a2e; }

    /* ══════════════════════════════
       SCENE — POST-CLEAR DIALOGUE
    ══════════════════════════════ */
    #scene-dialogue .room-bg {
      position: absolute; inset: 0;
      background-image: url('game4_dlg_bg.png');
      background-size: cover;
      background-position: center center;
      filter: blur(1px) brightness(0.8);
      transform: scale(1.04);
    }

    #scene-dialogue canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      image-rendering: pixelated;
    }

    .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
    }

    #char-sprite {
      position: absolute;
      left: 50%; bottom: 8vh;
      transform: translateX(-50%);
      width: 440px; height: 600px;
      display: flex; align-items: flex-end; justify-content: center;
      background: linear-gradient(160deg, #1e1e2a 0%, #0d0d14 100%);
      border: 4px solid #fff; outline: 4px solid #000;
      image-rendering: pixelated;
      animation: charBob 3s ease-in-out infinite;
      z-index: 10;
    }
    #char-sprite::after {
      content: '?';
      font-size: 140px; font-weight: 900;
      color: rgba(255,255,255,0.12);
      line-height: 1; margin-bottom: 30px;
    }
    #char-sprite.has-img { background: none; border: none; outline: none; }
    #char-sprite.has-img::after { display: none; }
    #char-sprite img {
      width: 100%; height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 0 18px rgba(160,160,160,0.6));
    }

    @keyframes charBob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-6px); }
    }

    #dialogue-ui {
      position: absolute; inset: 0;
      pointer-events: none;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 40px; z-index: 20;
    }
    #dialogue-wrap {
      position: relative;
      width: min(860px, 92vw);
      pointer-events: auto;
    }
    #char-name {
      position: absolute;
      top: -38px; left: 0;
      background: #0d0d0d;
      border: 4px solid #fff; outline: 4px solid #000;
      padding: 5px 18px 4px;
      font-size: 18px; font-weight: 900;
      letter-spacing: 2px; color: #fff;
      text-transform: uppercase; white-space: nowrap;
    }
    #char-name.verdict-name {
      border-color: #c8a84b;
      color: #e8c96a;
    }
    #dialogue-box {
      background: rgba(10,10,14,0.93);
      border: 4px solid #fff; outline: 4px solid #000;
      padding: 28px 36px 24px;
      min-height: 130px; position: relative;
    }
    #dialogue-box::before {
      content: ''; position: absolute;
      top: -1px; left: 0; right: 0;
      height: 4px; background: #c0392b;
    }
    #dialogue-text {
      font-size: 19px; line-height: 1.65;
      color: #f0f0f0; font-weight: 700;
      letter-spacing: 0.5px; min-height: 3em;
    }
    #continue-arrow {
      position: absolute; right: 22px; bottom: 18px;
      font-size: 22px; color: #fff;
      animation: blink 0.8s step-start infinite;
      opacity: 0; transition: opacity 0.2s;
    }
    #continue-arrow.visible { opacity: 1; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    #player-sprite {
      transition: left 0.13s linear, top 0.13s linear;
    }
    @keyframes walk-bob {
      0%   { transform: translateY(0px) scaleY(1); }
      30%  { transform: translateY(-8px) scaleY(1.06); }
      70%  { transform: translateY(-3px) scaleY(1.02); }
      100% { transform: translateY(0px) scaleY(1); }
    }
    #player-sprite.walking {
      animation: walk-bob 0.25s ease-out;
    }
    @keyframes walk-right {
      0%   { transform: translateX(0px)  scaleX(1)    scaleY(1); }
      20%  { transform: translateX(9px)  scaleX(1.14) scaleY(0.91); }
      60%  { transform: translateX(3px)  scaleX(0.95) scaleY(1.04); }
      100% { transform: translateX(0px)  scaleX(1)    scaleY(1); }
    }
    #player-sprite.walking-right {
      animation: walk-right 0.25s ease-out;
    }
    @keyframes walk-left {
      0%   { transform: translateX(0px)   scaleX(1)    scaleY(1); }
      20%  { transform: translateX(-9px)  scaleX(1.14) scaleY(0.91); }
      60%  { transform: translateX(-3px)  scaleX(0.95) scaleY(1.04); }
      100% { transform: translateX(0px)   scaleX(1)    scaleY(1); }
    }
    #player-sprite.walking-left {
      animation: walk-left 0.25s ease-out;
    }
  </style>
</head>
<body>

  <a id="back-btn" href="Base.html">← Menu</a>
  <div id="penalty-flash"></div>
  <div id="penalty-popup"></div>

  <!-- ── GRID PUZZLE ── -->
  <div id="scene-puzzle" class="scene active">
    <div class="room-bg"></div>
    <canvas id="grid-canvas"></canvas>
    <img id="player-sprite" src="karrar_idle.gif" style="position:absolute;pointer-events:none;display:none;" />
    <div id="death-overlay" style="position:fixed;inset:0;background:#0d0d0d;opacity:0;pointer-events:none;transition:opacity 0.35s ease;z-index:200;"></div>
    <div id="puzzle-hud">
      <div id="puzzle-hint">
        <span class="key-tag">▲▼◄►</span> / <span class="key-tag">WASD</span>
        &nbsp;·&nbsp; Push <span class="wall-tag">FEED WALLS</span>
        &nbsp;·&nbsp; Avoid <span class="toxic-tag">TOXIC COMMENTS</span> (−3 steps)
        &nbsp;·&nbsp; Dodge <span class="cancel-tag">CANCEL BARS</span>
      </div>
      <div id="step-counter">STEPS: <span id="steps">0</span> / <span id="max-display">18</span></div>
    </div>
  </div>

  <!-- ── POST-CLEAR DIALOGUE ── -->
  <div id="scene-dialogue" class="scene">
    <div class="room-bg"></div>
    <canvas id="dlg-canvas"></canvas>
    <div class="vignette"></div>
    <div id="char-sprite"></div>
    <div id="dialogue-ui">
      <div id="dialogue-wrap">
        <div id="char-name">Karrar</div>
        <div id="dialogue-box">
          <div id="dialogue-text"></div>
          <div id="continue-arrow">▼</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── STAGE COMPLETE ── -->
  <div id="scene-complete" class="scene">
    <div class="complete-title">STAGE <span>CLEAR</span></div>
    <div class="unlock-box">
      <div class="unlock-label">New Unlock</div>
      <div class="unlock-msg">Cancel Culture has been unlocked in Documents.</div>
    </div>
    <div style="display:flex; gap:20px;">
      <a class="btn-back btn-ending" href="ending.html">ENDING →</a>
    </div>
  </div>

  <script>
    const COLS = 9, ROWS = 7;
    const TILE = 90;
    const PIXEL = 6;
    const TOXIC_PENALTY = 3;

    let MAX_STEPS = 18;
    let steps     = 0;
    let won       = false;
    let playerAnim = 'idle';
    let kickTimer = null;

    const SPRITE_SRCS = {
      idle:       'karrar_idle.gif',
      kick_right: 'karrar_kick_right.gif',
      kick_left:  'karrar_kick_left.gif',
    };
    const playerSpriteEl = document.getElementById('player-sprite');

    function setAnim(anim) {
      if (playerAnim === anim) return;
      playerAnim = anim;
      playerSpriteEl.src = SPRITE_SRCS[anim];
      clearTimeout(kickTimer);
      if (anim !== 'idle') kickTimer = setTimeout(() => { playerAnim = 'idle'; playerSpriteEl.src = SPRITE_SRCS.idle; }, 320);
    }

    function positionPlayerSprite(ox, oy) {
      const ph = TILE * 1.3;
      const pw = TILE * 0.8;
      const px = ox + playerPos.x * TILE + TILE / 2 - pw / 2;
      const py = oy + playerPos.y * TILE + TILE - ph;
      playerSpriteEl.style.left   = px + 'px';
      playerSpriteEl.style.top    = py + 'px';
      playerSpriteEl.style.width  = pw + 'px';
      playerSpriteEl.style.height = ph + 'px';
      playerSpriteEl.style.display = 'block';
    }

    let playerPos = { x: 0, y: 6 };
    const goalPos  = { x: 8, y: 0 };

    // ── Level layout ──
    //   Col: 0 1 2 3 4 5 6 7 8
    // Row 0: . . . . . . . . G
    // Row 1: W W . W . W . W W   ← gaps only at cols 2,4,6
    // Row 2: [CANCEL BAR sweeps left↔right, width=2, 550ms]
    // Row 3: . . T . T . T . .   ← 3 toxic tiles at cols 2,4,6
    // Row 4: [CANCEL BAR sweeps right↔left, width=4, 370ms, fast]
    // Row 5: W . W . W . W . W   ← gaps only at cols 1,3,5,7
    // Row 6: P . . . . . . . .
    //
    // Safe route: enter via col 1 gap (row 5), dodge bars, cross col 1 (no toxic),
    // reach col 2 gap in row 1 by stepping sideways, then cross row 0 to goal.
    // Toxic at 2,4,6 punishes center-column approaches.

    // Harder map:
    // Row 1: walls at 0,1,3,5,7,8 → gaps only at cols 2,4,6
    // Row 5: walls at 0,2,4,6,8 → gaps only at cols 1,3,5,7
    // Row 3: 3 toxic tiles at cols 2,4,6 → punishes any non-edge vertical approach
    const INITIAL_WALLS = [
      { x:0, y:1 }, { x:1, y:1 }, { x:3, y:1 }, { x:5, y:1 }, { x:7, y:1 }, { x:8, y:1 },
      { x:0, y:5 }, { x:2, y:5 }, { x:4, y:5 }, { x:6, y:5 }, { x:8, y:5 },
    ];
    const INITIAL_TOXIC = [
      { x:2, y:3 },
      { x:4, y:3 },
      { x:6, y:3 },
    ];

    // Cancel bars — bounce left/right in their row
    // x = leftmost tile; bounces so x stays in [0, COLS-width]
    const INITIAL_CANCEL_BARS = [
      { row: 2, x: 0, width: 2, dir:  1, speed: 550 },
      { row: 4, x: 5, width: 4, dir: -1, speed: 370 },
    ];

    let feedWalls  = INITIAL_WALLS.map(w => ({ ...w }));
    let toxicTiles = INITIAL_TOXIC.map(t => ({ ...t }));
    let cancelBars = INITIAL_CANCEL_BARS.map(b => ({ ...b }));

    // Void cells — tightest border: top-left and bottom-right cut off
    // Stage 4 void: bilateral center pinch — both sides blocked in cancel-bar rows,
    // squeezing the playable corridor and eliminating edge-hugging strategies.
    const VOID_CELLS = [
      { x:0,y:2 }, { x:0,y:3 }, { x:0,y:4 },
      { x:8,y:2 }, { x:8,y:3 }, { x:8,y:4 },
    ];
    function isVoid(x, y) { return VOID_CELLS.some(v => v.x === x && v.y === y); }

    const gc   = document.getElementById('grid-canvas');
    const gctx = gc.getContext('2d');

    function setupGrid() {
      gc.width  = window.innerWidth;
      gc.height = window.innerHeight;
    }
    setupGrid();
    window.addEventListener('resize', () => { cityCache = null; setupGrid(); drawGrid(); });

    /* ── Goal image ── */
    const gavelImg = new Image();
    gavelImg.src = 'gavel.png';
    gavelImg.onload = drawGrid;

    /* ── Digital city background (procedural, cached) ── */
    let cityCache = null, cityCacheW = 0, cityCacheH = 0;

    function sr(n) { return (Math.abs(Math.sin(n * 127.1 + 311.7)) * 43758.5453) % 1; }

    function buildCity(W, H) {
      const pw = Math.ceil(W / PIXEL), ph = Math.ceil(H / PIXEL);
      const off = document.createElement('canvas');
      off.width = pw; off.height = ph;
      const c = off.getContext('2d');

      // Sky
      const sky = c.createLinearGradient(0, 0, 0, ph);
      sky.addColorStop(0,   '#010407');
      sky.addColorStop(0.65,'#030a14');
      sky.addColorStop(1,   '#05101e');
      c.fillStyle = sky; c.fillRect(0, 0, pw, ph);

      // Horizon glow
      const glow = c.createRadialGradient(pw/2, ph*0.7, 0, pw/2, ph*0.7, pw*0.55);
      glow.addColorStop(0,   'rgba(0,90,160,0.38)');
      glow.addColorStop(0.45,'rgba(0,50,100,0.16)');
      glow.addColorStop(1,   'rgba(0,0,0,0)');
      c.fillStyle = glow; c.fillRect(0, 0, pw, ph);

      const ground = Math.floor(ph * 0.7);

      // Build layout
      const NUM = 26;
      const minBW = Math.floor(pw / NUM * 0.65);
      const maxBW = Math.floor(pw / NUM * 2.0);
      const buildings = [];
      let bx = 0;
      for (let i = 0; bx < pw + maxBW; i++) {
        const bw  = minBW + Math.floor(sr(i * 3)       * (maxBW - minBW));
        const bh  = Math.floor(ph * (0.1 + sr(i * 7)  * 0.52));
        buildings.push({ x: bx, w: bw, h: bh, top: ground - bh });
        bx += bw + (sr(i * 11) < 0.25 ? 1 : 0);
      }

      // Back layer (taller, darker)
      buildings.forEach((b, i) => {
        if (i % 2 !== 0) return;
        const bh2 = b.h + Math.floor(sr(i * 13) * 18);
        c.fillStyle = '#050a0e';
        c.fillRect(b.x - 1, ground - bh2, b.w + 2, bh2);
      });

      // Main buildings
      const winOn  = ['rgba(0,255,65,0.75)', 'rgba(0,220,255,0.7)', 'rgba(80,160,255,0.65)', 'rgba(255,210,60,0.55)'];
      const winDim = ['rgba(0,255,65,0.14)', 'rgba(0,220,255,0.12)', 'rgba(80,140,255,0.10)'];

      buildings.forEach((b, i) => {
        const s = 7 + Math.floor(sr(i * 5) * 11);
        c.fillStyle = `rgb(${s},${s+4},${s+10})`;
        c.fillRect(b.x, b.top, b.w, b.h);

        // Left edge highlight
        c.fillStyle = 'rgba(0,180,255,0.14)';
        c.fillRect(b.x, b.top, 1, b.h);
        // Top edge highlight
        c.fillStyle = 'rgba(0,180,255,0.22)';
        c.fillRect(b.x, b.top, b.w, 1);

        // Antenna
        if (sr(i * 17) > 0.55) {
          const ax = b.x + Math.floor(b.w * 0.42);
          const ah = 3 + Math.floor(sr(i * 23) * 12);
          c.fillStyle = 'rgba(0,200,255,0.55)';
          c.fillRect(ax, b.top - ah, 1, ah);
          c.fillStyle = sr(i * 31) > 0.5 ? '#c0392b' : 'rgba(0,255,100,0.9)';
          c.fillRect(ax - 1, b.top - ah, 2, 2);
        }

        // Windows
        const wCols = Math.max(1, Math.floor(b.w / 4));
        const wRows = Math.max(1, Math.floor(b.h / 5));
        for (let wr = 1; wr < wRows - 1; wr++) {
          for (let wc = 0; wc < wCols; wc++) {
            const wx  = b.x + wc * 4 + 1;
            const wy  = b.top + wr * 5 + 1;
            const lit = sr(i * 100 + wr * 17 + wc * 7);
            if (lit > 0.58) {
              c.fillStyle = winOn [Math.floor(sr(i*200+wr*20+wc) * winOn.length)];
              c.fillRect(wx, wy, 2, 2);
            } else if (lit > 0.42) {
              c.fillStyle = winDim[Math.floor(sr(i*300+wr*30+wc) * winDim.length)];
              c.fillRect(wx, wy, 2, 2);
            }
          }
        }
      });

      // Ground base
      c.fillStyle = '#030709';
      c.fillRect(0, ground, pw, ph - ground);

      // Ground horizontal grid
      for (let y = ground; y < ph; y += 4) {
        const a = 0.03 + ((y - ground) / (ph - ground)) * 0.09;
        c.fillStyle = `rgba(0,120,220,${a.toFixed(2)})`;
        c.fillRect(0, y, pw, 1);
      }

      // Ground perspective verticals
      const vx0 = pw / 2;
      c.lineWidth = 0.5;
      for (let vx = -pw; vx <= pw * 2; vx += 10) {
        c.beginPath();
        c.strokeStyle = 'rgba(0,100,200,0.09)';
        c.moveTo(vx0, ground);
        c.lineTo(vx, ph);
        c.stroke();
      }

      // Circuit traces on ground
      for (let i = 0; i < 10; i++) {
        const tx   = Math.floor(sr(i * 41) * pw);
        const ty   = ground + 2 + Math.floor(sr(i * 53) * (ph - ground - 4));
        const tlen = 6 + Math.floor(sr(i * 61) * 28);
        c.fillStyle = 'rgba(0,255,65,0.2)';
        c.fillRect(tx, ty, tlen, 1);
        c.fillStyle = 'rgba(0,255,65,0.45)';
        c.fillRect(tx + tlen - 1, ty - 1, 2, 3);
      }

      cityCacheW = W; cityCacheH = H; cityCache = off;
      return off;
    }

    /* ── Cancel bar timers ── */
    let barTimers = [];

    function startBarTimers() {
      cancelBars.forEach((bar, i) => {
        barTimers[i] = setInterval(() => {
          const maxX = COLS - bar.width;
          bar.x += bar.dir;
          if (bar.x >= maxX) { bar.x = maxX; bar.dir = -1; }
          if (bar.x <= 0)    { bar.x = 0;    bar.dir =  1; }
          drawGrid();
          // Bar swept over player
          if (playerPos.y === bar.row &&
              playerPos.x >= bar.x && playerPos.x < bar.x + bar.width) {
            triggerDeath();
          }
        }, bar.speed);
      });
    }

    function stopBarTimers() {
      barTimers.forEach(t => clearInterval(t));
      barTimers = [];
    }

    function isOnCancelBar(x, y) {
      return cancelBars.some(b => b.row === y && x >= b.x && x < b.x + b.width);
    }

    /* ── Draw feed wall (cyan card) ── */
    function drawFeedWall(tx, ty) {
      const pad = 6, r = 4;
      const x = tx + pad, y = ty + pad;
      const w = TILE - pad * 2, h = TILE - pad * 2;
      gctx.fillStyle = 'rgba(20,50,80,0.88)';
      gctx.beginPath(); gctx.roundRect(x, y, w, h, r); gctx.fill();
      gctx.strokeStyle = 'rgba(52,180,219,0.85)';
      gctx.lineWidth = 2.5;
      gctx.beginPath(); gctx.roundRect(x, y, w, h, r); gctx.stroke();
      gctx.fillStyle = 'rgba(52,152,219,0.7)';
      gctx.fillRect(x + r, y, w - r * 2, 3);
      gctx.fillStyle = 'rgba(52,152,219,0.5)';
      gctx.beginPath(); gctx.arc(x + 12, y + 14, 8, 0, Math.PI * 2); gctx.fill();
      gctx.strokeStyle = 'rgba(127,204,240,0.6)'; gctx.lineWidth = 1.5; gctx.stroke();
      gctx.fillStyle = 'rgba(127,204,240,0.55)';
      const lw1 = w - 34, lw2 = lw1 * 0.65, lw3 = lw1 * 0.8;
      gctx.fillRect(x + 26, y + 8,  lw1, 3.5);
      gctx.fillRect(x + 8,  y + 28, lw2, 3);
      gctx.fillRect(x + 8,  y + 36, lw3, 3);
      gctx.fillRect(x + 8,  y + 46, lw2 * 0.7, 3);
      gctx.fillStyle = 'rgba(52,152,219,0.4)';
      for (let i = 0; i < 3; i++) gctx.fillRect(x + 8 + i * 18, y + h - 14, 12, 6);
    }

    /* ── Draw toxic comment tile ── */
    function drawToxic(tx, ty) {
      const pad = 7, r = 6;
      const x = tx + pad, y = ty + pad;
      const w = TILE - pad * 2, h = TILE - pad * 2;
      gctx.fillStyle = 'rgba(60,10,55,0.92)';
      gctx.beginPath(); gctx.roundRect(x, y, w, h, r); gctx.fill();
      gctx.strokeStyle = 'rgba(192,57,180,0.9)'; gctx.lineWidth = 2.5;
      gctx.beginPath(); gctx.roundRect(x, y, w, h, r); gctx.stroke();
      gctx.fillStyle = 'rgba(192,57,180,0.7)';
      gctx.fillRect(x + r, y, w - r * 2, 3);
      const bx = x + w / 2, by = y + h;
      gctx.fillStyle = 'rgba(60,10,55,0.92)';
      gctx.beginPath();
      gctx.moveTo(bx - 8, by - 2); gctx.lineTo(bx + 8, by - 2); gctx.lineTo(bx, by + 10);
      gctx.closePath(); gctx.fill();
      gctx.strokeStyle = 'rgba(192,57,180,0.9)'; gctx.lineWidth = 2;
      gctx.beginPath();
      gctx.moveTo(bx - 8, by - 2); gctx.lineTo(bx, by + 10); gctx.lineTo(bx + 8, by - 2);
      gctx.stroke();
      gctx.fillStyle = 'rgba(240,127,240,0.95)';
      gctx.font = `bold ${Math.floor(TILE * 0.28)}px 'Courier New', monospace`;
      gctx.textAlign = 'center'; gctx.textBaseline = 'middle';
      gctx.fillText('!!!', tx + TILE / 2, ty + TILE / 2 - 4);
      gctx.textAlign = 'left'; gctx.textBaseline = 'alphabetic';
      gctx.fillStyle = 'rgba(240,127,240,0.4)';
      gctx.fillRect(x + 8, y + h - 20, w - 16, 3);
      gctx.fillRect(x + 8, y + h - 14, (w - 16) * 0.7, 3);
    }

    /* ── Draw cancel bar tile ── */
    function drawCancelBar(tx, ty, isFirst) {
      const pad = 3;
      const x = tx + pad, y = ty + pad;
      const w = TILE - pad * 2, h = TILE - pad * 2;

      // Dark red fill
      gctx.fillStyle = 'rgba(130,8,8,0.95)';
      gctx.fillRect(x, y, w, h);

      // Bright red border
      gctx.strokeStyle = 'rgba(230,40,40,0.95)';
      gctx.lineWidth = 3;
      gctx.strokeRect(x, y, w, h);

      // Top accent stripe
      gctx.fillStyle = 'rgba(230,40,40,1)';
      gctx.fillRect(x, y, w, 4);

      // Big X
      const cx = tx + TILE / 2, cy = ty + TILE / 2;
      const arm = TILE * 0.2;
      gctx.strokeStyle = 'rgba(255,90,90,0.95)';
      gctx.lineWidth = 6;
      gctx.beginPath();
      gctx.moveTo(cx - arm, cy - arm); gctx.lineTo(cx + arm, cy + arm);
      gctx.moveTo(cx + arm, cy - arm); gctx.lineTo(cx - arm, cy + arm);
      gctx.stroke();

      // "CANCELLED" label on first tile only
      if (isFirst) {
        gctx.fillStyle = 'rgba(255,130,130,0.85)';
        gctx.font = `bold 9px 'Courier New', monospace`;
        gctx.textAlign = 'left'; gctx.textBaseline = 'alphabetic';
        gctx.fillText('CANCELLED', x + 4, y + h - 6);
      }
    }

    function drawGrid() {
      const W = gc.width, H = gc.height;
      gctx.clearRect(0, 0, W, H);

      // Digital city background (cached)
      const bg = (cityCacheW === W && cityCacheH === H) ? cityCache : buildCity(W, H);
      gctx.imageSmoothingEnabled = false;
      gctx.drawImage(bg, 0, 0, bg.width, bg.height, 0, 0, W, H);

      const gridW = COLS * TILE, gridH = ROWS * TILE;
      const ox = Math.floor((W - gridW) / 2);
      const oy = Math.floor((H - gridH) / 2) - 30;

      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const tx = ox + col * TILE;
          const ty = oy + row * TILE;

          const isVoidCell = isVoid(col, row);
          const isPlayer = col === playerPos.x && row === playerPos.y;
          const isGoal   = col === goalPos.x   && row === goalPos.y;
          const isWall   = feedWalls.some(fw => fw.x === col && fw.y === row);
          const isToxic  = toxicTiles.some(t  => t.x  === col && t.y  === row);
          const barInfo  = cancelBars.find(b => b.row === row && col >= b.x && col < b.x + b.width);
          const isBar    = !!barInfo;

          if (isVoidCell) {
            // Game 4 void: glowing red cancel barrier
            gctx.fillStyle = '#0a0000';
            gctx.fillRect(tx, ty, TILE, TILE);
            // Glowing red grid (circuit-wall style)
            gctx.strokeStyle = 'rgba(180,20,20,0.55)';
            gctx.lineWidth = 1.5;
            const step = 15;
            for (let gx = tx; gx <= tx + TILE; gx += step) {
              gctx.beginPath(); gctx.moveTo(gx, ty); gctx.lineTo(gx, ty + TILE); gctx.stroke();
            }
            for (let gy = ty; gy <= ty + TILE; gy += step) {
              gctx.beginPath(); gctx.moveTo(tx, gy); gctx.lineTo(tx + TILE, gy); gctx.stroke();
            }
            // Big red X across cell
            gctx.strokeStyle = 'rgba(200,30,30,0.85)';
            gctx.lineWidth = 3;
            gctx.beginPath(); gctx.moveTo(tx + 8, ty + 8); gctx.lineTo(tx + TILE - 8, ty + TILE - 8); gctx.stroke();
            gctx.beginPath(); gctx.moveTo(tx + TILE - 8, ty + 8); gctx.lineTo(tx + 8, ty + TILE - 8); gctx.stroke();
            // Hot border
            gctx.strokeStyle = 'rgba(220,40,40,0.9)';
            gctx.lineWidth = 2;
            gctx.strokeRect(tx + 1, ty + 1, TILE - 2, TILE - 2);
            continue;
          }

          // Tile base
          gctx.fillStyle = isGoal  ? 'rgba(30,22,0,0.6)'
                         : isBar   ? 'rgba(130,8,8,0.18)'
                         : isToxic ? 'rgba(192,57,180,0.12)'
                         : 'rgba(0,0,0,0.30)';
          gctx.fillRect(tx, ty, TILE, TILE);

          // Tile border
          gctx.strokeStyle = isGoal  ? 'rgba(200,168,75,0.55)'
                           : isBar   ? 'rgba(230,40,40,0.35)'
                           : isToxic ? 'rgba(192,57,180,0.25)'
                           : 'rgba(255,255,255,0.18)';
          gctx.lineWidth = 1.5;
          gctx.strokeRect(tx + 0.75, ty + 0.75, TILE - 1.5, TILE - 1.5);

          // Goal — Gavel image
          if (isGoal) {
            const pad = 8;
            if (gavelImg.complete && gavelImg.naturalWidth > 0) {
              gctx.drawImage(gavelImg, tx + pad, ty + pad, TILE - pad * 2, TILE - pad * 2);
            }
            gctx.strokeStyle = 'rgba(200,168,75,0.8)';
            gctx.lineWidth = 3;
            gctx.strokeRect(tx + 2, ty + 2, TILE - 4, TILE - 4);
          }

          if (isWall)  drawFeedWall(tx, ty);
          if (isToxic) drawToxic(tx, ty);
          if (isBar)   drawCancelBar(tx, ty, col === barInfo.x);

          // player drawn after loop
        }
      }

      // Grid border
      gctx.strokeStyle = '#fff'; gctx.lineWidth = 4;
      gctx.strokeRect(ox, oy, gridW, gridH);
      gctx.fillStyle = '#c0392b';
      gctx.fillRect(ox, oy - 4, gridW, 4);

      // Hitbox outline around player tile
      const hx = ox + playerPos.x * TILE;
      const hy = oy + playerPos.y * TILE;
      gctx.save();
      gctx.strokeStyle = 'rgba(255,255,255,0.85)';
      gctx.lineWidth = 2;
      gctx.strokeRect(hx + 1, hy + 1, TILE - 2, TILE - 2);
      gctx.strokeStyle = 'rgba(192,57,43,0.7)';
      gctx.lineWidth = 1.5;
      gctx.strokeRect(hx + 4, hy + 4, TILE - 8, TILE - 8);
      gctx.restore();

      positionPlayerSprite(ox, oy);

      document.getElementById('steps').textContent       = steps;
      document.getElementById('max-display').textContent = MAX_STEPS;
    }

    function resetLevel() {
      playerPos   = { x: 0, y: 6 };
      feedWalls   = INITIAL_WALLS.map(w => ({ ...w }));
      toxicTiles  = INITIAL_TOXIC.map(t => ({ ...t }));
      cancelBars  = INITIAL_CANCEL_BARS.map(b => ({ ...b }));
      MAX_STEPS   = 18;
      steps       = 0;
      won         = false;
      deathLocked = false;
      stopBarTimers();
      startBarTimers();
      drawGrid();
    }

    /* ── Penalty flash (toxic) ── */
    let flashTimer = null;
    function showPenalty() {
      const flash = document.getElementById('penalty-flash');
      const popup = document.getElementById('penalty-popup');
      flash.classList.remove('death');
      flash.classList.add('show');
      popup.classList.remove('death-msg');
      popup.textContent = '-3 STEPS';
      popup.classList.add('show');
      clearTimeout(flashTimer);
      flashTimer = setTimeout(() => {
        flash.classList.remove('show');
        popup.classList.remove('show');
      }, 420);
    }

    /* ── Death flash (cancel bar) ── */
    let deathLocked = false;
    const deathOverlay = document.getElementById('death-overlay');
    function fadeReset() {
      deathOverlay.style.opacity = '1';
      setTimeout(() => {
        resetLevel();
        setTimeout(() => { deathOverlay.style.opacity = '0'; }, 80);
      }, 380);
    }

    function triggerDeath() {
      if (deathLocked || won) return;
      deathLocked = true;
      stopBarTimers();
      const flash = document.getElementById('penalty-flash');
      const popup = document.getElementById('penalty-popup');
      flash.classList.add('show', 'death');
      popup.classList.add('show', 'death-msg');
      popup.textContent = 'CANCELLED';
      setTimeout(() => {
        flash.classList.remove('show', 'death');
        popup.classList.remove('show', 'death-msg');
        fadeReset();
      }, 500);
    }

    /* ── Movement ── */
    function tryMove(dx, dy) {
      if (won || deathLocked) return;
      const nx = playerPos.x + dx;
      const ny = playerPos.y + dy;
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;
      if (isVoid(nx, ny)) return;

      // Feed wall push
      const wallIdx = feedWalls.findIndex(fw => fw.x === nx && fw.y === ny);
      let kicked = false;
      if (wallIdx >= 0) {
        const wx = nx + dx, wy = ny + dy;
        if (wx < 0 || wx >= COLS || wy < 0 || wy >= ROWS) return;
        if (feedWalls.some(fw => fw.x === wx && fw.y === wy)) return;
        if (toxicTiles.some(t => t.x === wx && t.y === wy)) return;
        if (isOnCancelBar(wx, wy)) return;
        if (isVoid(wx, wy)) return;
        feedWalls[wallIdx] = { x: wx, y: wy };
        setAnim(dx === 1 || dy === -1 ? 'kick_right' : 'kick_left');
        kicked = true;
      } else {
        setAnim('idle');
        playerPos = { x: nx, y: ny };
        const walkCls = dx === 1 ? 'walking-right' : dx === -1 ? 'walking-left' : 'walking';
        playerSpriteEl.classList.remove('walking', 'walking-right', 'walking-left');
        void playerSpriteEl.offsetWidth;
        playerSpriteEl.classList.add(walkCls);
        setTimeout(() => playerSpriteEl.classList.remove(walkCls), 260);
      }

      steps++;

      // Only check tile effects when player actually moved
      if (!kicked) {
        // Toxic tile contact
        const toxicIdx = toxicTiles.findIndex(t => t.x === nx && t.y === ny);
        if (toxicIdx >= 0) {
          MAX_STEPS -= TOXIC_PENALTY;
          toxicTiles.splice(toxicIdx, 1);
          showPenalty();
        }

        // Cancel bar contact — instant death/reset
        if (isOnCancelBar(nx, ny)) {
          triggerDeath();
          return;
        }
      }

      drawGrid();

      // Win
      if (playerPos.x === goalPos.x && playerPos.y === goalPos.y) {
        won = true;
        stopBarTimers();
        localStorage.setItem('stage4Complete', 'true');
        setTimeout(() => {
          document.getElementById('scene-puzzle').classList.remove('active');
          startDialogue();
        }, 500);
        return;
      }

      // Out of steps
      if (steps >= MAX_STEPS) fadeReset();
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('scene-puzzle').classList.contains('active')) return;
      const dirs = {
        ArrowUp:    { dx: 0,  dy: -1 },
        ArrowDown:  { dx: 0,  dy:  1 },
        ArrowLeft:  { dx: -1, dy:  0 },
        ArrowRight: { dx:  1, dy:  0 },
        KeyW:       { dx: 0,  dy: -1 },
        KeyS:       { dx: 0,  dy:  1 },
        KeyA:       { dx: -1, dy:  0 },
        KeyD:       { dx:  1, dy:  0 },
      };
      const d = dirs[e.code];
      if (!d) return;
      e.preventDefault();
      tryMove(d.dx, d.dy);
    });

    // Bars start moving immediately
    startBarTimers();

    /* ══════════════════════════════
       POST-CLEAR DIALOGUE
       Fill in the lines array below for Stage 4 dialogue.
    ══════════════════════════════ */
    const lines = [
      { name: 'THE VERDICT', isVerdict: true,  sprite: 'verdict_1.png', text: 'You shouldn\'t have come here.' },
      { name: 'THE VERDICT', isVerdict: true,  sprite: 'verdict_2.png', text: 'Either way, 1.2 million people have already decided.' },
      { name: 'Karrar',      isVerdict: false, sprite: '4.png',          text: 'Decided what?' },
      { name: 'THE VERDICT', isVerdict: true,  sprite: 'verdict_3.png', text: 'That you\'re done.' },
      { name: 'Karrar',      isVerdict: false, sprite: '10.png',         text: 'Based on what?' },
      { name: 'THE VERDICT', isVerdict: true,  sprite: 'verdict_4.png', text: 'Just be thankful that the internet is holding people like you accountable.' },
      { name: 'Karrar',      isVerdict: false, sprite: '8.png',          text: 'That\'s not accountability, that\'s just assumptions.' },
      { name: 'THE VERDICT', isVerdict: true,  sprite: 'verdict_3.png', text: 'Assumptions become truth when enough people agree.' },
      { name: 'Karrar',      isVerdict: false, sprite: '1.png',          text: 'That\'s not how truth works, and I didn\'t even get to explain.' },
      { name: 'THE VERDICT', isVerdict: true,  sprite: 'verdict_1.png', text: 'You\'re already too late.' },
      { name: 'THE VERDICT', isVerdict: true,  sprite: 'verdict_6.png', text: 'And you\'ll never recover from this anyway.' },
      { name: 'Karrar',      isVerdict: false, sprite: '6.png',         text: 'Maybe not.\nBut I\'ll still be here.\nAnd I\'ll still have my channel.' },
      { name: 'THE VERDICT', isVerdict: true,  sprite: 'verdict_5.png', text: '...\nWhatever.' },
    ];

    const dlgCanvas = document.getElementById('dlg-canvas');
    const dlgCtx    = dlgCanvas.getContext('2d');
    const dlgBgImg  = new Image();
    dlgBgImg.src = 'game4_dlg_bg.png';

    function setupDlgBg() {
      dlgCanvas.width  = window.innerWidth;
      dlgCanvas.height = window.innerHeight;
      if (dlgBgImg.complete && dlgBgImg.naturalWidth > 0) renderDlgBg();
    }
    function renderDlgBg() {
      const w = dlgCanvas.width, h = dlgCanvas.height;
      const scale = Math.max(w / dlgBgImg.width, h / dlgBgImg.height);
      const sw = dlgBgImg.width * scale, sh = dlgBgImg.height * scale;
      const ox = (w - sw) / 2, oy = (h - sh) / 2;
      const off = document.createElement('canvas');
      off.width  = Math.ceil(w / PIXEL);
      off.height = Math.ceil(h / PIXEL);
      const octx = off.getContext('2d');
      octx.filter = 'contrast(1.1) saturate(0.8) brightness(0.75)';
      octx.drawImage(dlgBgImg, ox / PIXEL, oy / PIXEL, sw / PIXEL, sh / PIXEL);
      dlgCtx.imageSmoothingEnabled = false;
      dlgCtx.drawImage(off, 0, 0, off.width, off.height, 0, 0, w, h);
    }
    dlgBgImg.onload = () => {
      if (document.getElementById('scene-dialogue').classList.contains('active')) setupDlgBg();
    };

    const textEl   = document.getElementById('dialogue-text');
    const nameEl   = document.getElementById('char-name');
    const arrowEl  = document.getElementById('continue-arrow');
    const spriteEl = document.getElementById('char-sprite');
    const boxEl    = document.getElementById('dialogue-box');

    let lineIdx = 0, charIdx = 0, typing = false, dlgTimer = null;

    function showLine(idx) {
      if (idx >= lines.length) {
        document.getElementById('scene-dialogue').classList.remove('active');
        document.getElementById('scene-complete').classList.add('active');
        return;
      }
      const line = lines[idx];
      nameEl.textContent = line.name;
      nameEl.className   = line.isVerdict ? 'verdict-name' : '';
      boxEl.className    = '';

      spriteEl.innerHTML = '';
      spriteEl.className = '';
      if (line.sprite) {
        spriteEl.classList.add('has-img');
        const img = document.createElement('img');
        img.src = line.sprite;
        spriteEl.appendChild(img);
      }

      textEl.textContent = '';
      arrowEl.classList.remove('visible');
      charIdx = 0; typing = true;
      clearInterval(dlgTimer);
      dlgTimer = setInterval(() => {
        const ch = line.text[charIdx++];
        if (ch === '\n') { textEl.appendChild(document.createElement('br')); }
        else { textEl.appendChild(document.createTextNode(ch)); }
        if (charIdx >= line.text.length) {
          clearInterval(dlgTimer);
          typing = false;
          arrowEl.classList.add('visible');
        }
      }, 38);
    }

    function advance() {
      if (typing) {
        clearInterval(dlgTimer);
        textEl.innerHTML = lines[lineIdx].text.replace(/\n/g, '<br>');
        charIdx = lines[lineIdx].text.length;
        typing  = false;
        arrowEl.classList.add('visible');
      } else {
        lineIdx++;
        showLine(lineIdx);
      }
    }

    document.getElementById('dialogue-box').addEventListener('click', advance);
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'Enter') {
        if (document.getElementById('scene-dialogue').classList.contains('active')) advance();
      }
    });

    function startDialogue() {
      lineIdx = 0;
      document.getElementById('scene-dialogue').classList.add('active');
      setupDlgBg();
      showLine(0);
    }
  </script>
